<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель галереи - Art Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="bg-gradient-to-r from-amber-500 to-orange-600 text-white p-6 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold"><i class="fas fa-store mr-2"></i>Панель галереи</h1>
                <p class="text-white/80 mt-1" id="gallery-name">Загрузка...</p>
            </div>
            <div class="flex gap-4">
                <button onclick="showCreateExhibitionModal()" class="bg-white/20 hover:bg-white/30 px-6 py-2 rounded-lg transition">
                    <i class="fas fa-plus mr-2"></i>Создать выставку
                </button>
                <a href="/" class="bg-white/20 hover:bg-white/30 px-6 py-2 rounded-lg transition">
                    <i class="fas fa-home mr-2"></i>На главную
                </a>
            </div>
        </div>
    </div>

    <div class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Выставок проведено</p>
                        <p class="text-3xl font-bold text-gray-800" id="total-exhibitions">0</p>
                    </div>
                    <div class="text-4xl text-amber-500"><i class="fas fa-building"></i></div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Активных выставок</p>
                        <p class="text-3xl font-bold text-gray-800" id="active-exhibitions">0</p>
                    </div>
                    <div class="text-4xl text-green-500"><i class="fas fa-calendar-check"></i></div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-sm">Репутация</p>
                        <p class="text-3xl font-bold text-gray-800" id="trust-level">0.0</p>
                    </div>
                    <div class="text-4xl text-blue-500"><i class="fas fa-star"></i></div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow">
            <div class="p-6 border-b">
                <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-building mr-2"></i>Выставки</h2>
            </div>
            <div class="p-6" id="exhibitions-list"></div>
        </div>
    </div>

    <div id="create-exhibition-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4">
            <div class="p-6 border-b">
                <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-plus-circle mr-2"></i>Создать выставку</h2>
            </div>
            <form id="create-exhibition-form" class="p-6 space-y-4">
                <input type="hidden" id="gallery-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Название выставки</label>
                    <input type="text" name="exhibition_name" required class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Произведение (ID)</label>
                    <input type="text" name="artwork_id" required class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Дата начала</label>
                        <input type="date" name="start_date" required class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Дата окончания</label>
                        <input type="date" name="end_date" required class="w-full px-4 py-2 border rounded-lg">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Куратор</label>
                    <input type="text" name="curator" class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div class="flex justify-end gap-4 pt-4">
                    <button type="button" onclick="hideCreateExhibitionModal()" class="px-6 py-2 border rounded-lg">Отмена</button>
                    <button type="submit" class="px-6 py-2 bg-amber-500 text-white rounded-lg hover:bg-amber-600">
                        <i class="fas fa-save mr-2"></i>Создать
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        const GALLERY_ID = 'gallery-1';
        let galleryDashboard;

        async function init() {
            galleryDashboard = new window.ArtBank.GalleryDashboard(GALLERY_ID);
            document.getElementById('gallery-id').value = GALLERY_ID;
            await loadProfile();
            await loadExhibitions();
        }

        async function loadProfile() {
            const data = await galleryDashboard.loadProfile();
            document.getElementById('gallery-name').textContent = data.profile.name;
            document.getElementById('total-exhibitions').textContent = data.stats.total_exhibitions;
            document.getElementById('trust-level').textContent = data.stats.trust_level.toFixed(2);
            
            const now = new Date();
            const active = data.exhibitions.filter(e => new Date(e.end_date) > now);
            document.getElementById('active-exhibitions').textContent = active.length;
        }

        async function loadExhibitions() {
            const data = await galleryDashboard.loadExhibitions();
            const container = document.getElementById('exhibitions-list');
            
            if (data.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">Нет выставок</p>';
                return;
            }
            
            container.innerHTML = data.map(ex => `
                <div class="bg-gray-50 rounded-lg p-6 mb-4">
                    <h3 class="text-xl font-bold text-gray-800 mb-2">${ex.exhibition_name}</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm text-gray-600">
                        <p><i class="fas fa-image mr-2"></i>Произведение: ${ex.artwork_id}</p>
                        <p><i class="fas fa-user mr-2"></i>Куратор: ${ex.curator || 'н/д'}</p>
                        <p><i class="fas fa-calendar mr-2"></i>Начало: ${window.ArtBank.formatDate(ex.start_date)}</p>
                        <p><i class="fas fa-calendar-check mr-2"></i>Окончание: ${window.ArtBank.formatDate(ex.end_date)}</p>
                    </div>
                </div>
            `).join('');
        }

        function showCreateExhibitionModal() {
            document.getElementById('create-exhibition-modal').classList.remove('hidden');
        }

        function hideCreateExhibitionModal() {
            document.getElementById('create-exhibition-modal').classList.add('hidden');
        }

        document.getElementById('create-exhibition-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                artwork_id: formData.get('artwork_id'),
                gallery_node_id: GALLERY_ID,
                exhibition_name: formData.get('exhibition_name'),
                start_date: formData.get('start_date'),
                end_date: formData.get('end_date'),
                curator: formData.get('curator')
            };
            
            try {
                await galleryDashboard.createExhibition(data);
                window.ArtBank.showToast('Выставка создана!', 'success');
                hideCreateExhibitionModal();
                await loadProfile();
                await loadExhibitions();
            } catch (error) {
                window.ArtBank.showToast('Ошибка создания выставки', 'error');
            }
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
