name: CI - Test & Lint

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Code quality checks
  lint:
    runs-on: ubuntu-latest
    name: Lint Code
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check TypeScript
        run: npx tsc --noEmit || echo "TypeScript check completed"
        
      - name: Check formatting (if prettier is configured)
        run: |
          if [ -f ".prettierrc" ] || [ -f "prettier.config.js" ]; then
            npx prettier --check "src/**/*.{ts,tsx}"
          else
            echo "Prettier not configured, skipping"
          fi

  # Build test
  build:
    runs-on: ubuntu-latest
    name: Build Test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(stat -f%z dist/_worker.js 2>/dev/null || stat -c%s dist/_worker.js)
          BUNDLE_SIZE_KB=$((BUNDLE_SIZE / 1024))
          echo "Bundle size: ${BUNDLE_SIZE_KB} KB"
          
          # Warn if bundle is too large (> 500 KB)
          if [ $BUNDLE_SIZE_KB -gt 500 ]; then
            echo "⚠️ Warning: Bundle size is large (${BUNDLE_SIZE_KB} KB)"
            echo "Consider optimizing imports or code splitting"
          else
            echo "✅ Bundle size is acceptable (${BUNDLE_SIZE_KB} KB)"
          fi
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # API endpoint tests
  test-api:
    runs-on: ubuntu-latest
    name: API Tests
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          
      - name: Start local Wrangler dev server
        run: |
          npx wrangler pages dev dist --local --port 8788 &
          WRANGLER_PID=$!
          echo "WRANGLER_PID=$WRANGLER_PID" >> $GITHUB_ENV
          
          # Wait for server to be ready
          echo "Waiting for Wrangler dev server..."
          for i in {1..30}; do
            if curl -s http://localhost:8788/api/health/circuit-breakers > /dev/null 2>&1; then
              echo "✅ Server is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          
      - name: Test public endpoints
        run: |
          echo "Testing public endpoints..."
          
          # Test health endpoint
          curl -f http://localhost:8788/api/health/circuit-breakers || exit 1
          
          # Test graph data endpoint
          curl -f http://localhost:8788/api/graph-data || exit 1
          
          # Test dashboard stats
          curl -f http://localhost:8788/api/dashboard/stats || exit 1
          
          echo "✅ All public endpoint tests passed"
          
      - name: Test authentication flow
        run: |
          echo "Testing authentication flow..."
          
          # Register test user
          REGISTER_RESPONSE=$(curl -s -X POST http://localhost:8788/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{
              "email": "ci-test@artbank.io",
              "password": "TestPassword123!",
              "full_name": "CI Test User",
              "role": "collector"
            }')
          
          echo "Register response: $REGISTER_RESPONSE"
          
          # Login
          LOGIN_RESPONSE=$(curl -s -X POST http://localhost:8788/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{
              "email": "ci-test@artbank.io",
              "password": "TestPassword123!"
            }')
          
          echo "Login response: $LOGIN_RESPONSE"
          
          # Extract token
          TOKEN=$(echo $LOGIN_RESPONSE | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
          
          if [ -z "$TOKEN" ]; then
            echo "❌ Failed to get access token"
            exit 1
          fi
          
          echo "✅ Got access token: ${TOKEN:0:50}..."
          
          # Test protected endpoint
          curl -f -X POST http://localhost:8788/api/nodes \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"node_type":"artist","name":"CI Test Artist","trust_level":0.9}' || exit 1
          
          echo "✅ Protected endpoint test passed"
          
      - name: Stop Wrangler server
        if: always()
        run: |
          if [ ! -z "$WRANGLER_PID" ]; then
            kill $WRANGLER_PID || true
          fi
