name: Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - production
          - staging
      migration_action:
        description: 'Migration action'
        required: true
        type: choice
        options:
          - apply
          - rollback
          - info

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Apply Database Migration
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run migration - ${{ inputs.migration_action }} on ${{ inputs.environment }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations ${{ inputs.migration_action }} art-bank-db
          
      - name: Notify success
        if: success()
        run: |
          echo "✅ Migration ${{ inputs.migration_action }} completed successfully on ${{ inputs.environment }}"
          
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Migration ${{ inputs.migration_action }} failed on ${{ inputs.environment }}"
